name: Deploy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  publish-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node (docs gate optional)
        if: ${{ vars.RELEASE_DOCS_GATE == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies (docs gate optional)
        if: ${{ vars.RELEASE_DOCS_GATE == 'true' }}
        run: npm ci

      - name: Docs strict release gate (optional)
        if: ${{ vars.RELEASE_DOCS_GATE == 'true' }}
        run: npm run test:docs:release-gate

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/finhub-api
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Trigger external deploy webhook (optional)
        if: ${{ env.DEPLOY_WEBHOOK_URL != '' }}
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          curl -fsS -X POST "$DEPLOY_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"image\":\"ghcr.io/${{ github.repository_owner }}/finhub-api\",\"digest\":\"${IMAGE_DIGEST}\"}"
