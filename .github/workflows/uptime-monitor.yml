name: Uptime Monitor

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  healthcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      UPTIME_API_URL: ${{ vars.UPTIME_API_URL }}
      UPTIME_WEB_URL: ${{ vars.UPTIME_WEB_URL }}
      UPTIME_MONITOR_ENFORCE: ${{ vars.UPTIME_MONITOR_ENFORCE }}
      UPTIME_ALERT_WEBHOOK_URL: ${{ secrets.UPTIME_ALERT_WEBHOOK_URL }}

    steps:
      - name: Validate monitor targets
        shell: bash
        run: |
          set -euo pipefail
          ENFORCE_MODE="${UPTIME_MONITOR_ENFORCE:-false}"

          if [ -z "${UPTIME_API_URL:-}" ]; then
            if [ "$ENFORCE_MODE" = "true" ]; then
              echo "::error title=Config missing::Repository variable UPTIME_API_URL em falta."
              exit 1
            fi

            echo "::notice title=Uptime monitor skipped::UPTIME_API_URL em falta (modo pre-release nao bloqueante)."
            {
              echo "## Uptime Monitor - skipped"
              echo "- Razao: UPTIME_API_URL em falta."
              echo "- Acao: configurar a variavel no pre-release para ativar os checks."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "UPTIME_MONITOR_SKIP=1" >> "$GITHUB_ENV"
            exit 0
          fi

          if [[ ! "$UPTIME_API_URL" =~ ^https?:// ]]; then
            echo "::error title=Config invalid::UPTIME_API_URL deve comecar por http:// ou https:// (valor atual: $UPTIME_API_URL)."
            exit 1
          fi

          if [ -n "${UPTIME_WEB_URL:-}" ] && [[ ! "$UPTIME_WEB_URL" =~ ^https?:// ]]; then
            echo "::error title=Config invalid::UPTIME_WEB_URL deve comecar por http:// ou https:// (valor atual: $UPTIME_WEB_URL)."
            exit 1
          fi

          {
            echo "## Uptime Monitor - alvos configurados"
            echo "- API: $UPTIME_API_URL"
            if [ -n "${UPTIME_WEB_URL:-}" ]; then
              echo "- WEB: $UPTIME_WEB_URL"
            else
              echo "- WEB: (nao configurado, check ignorado)"
            fi
            if [ -n "${UPTIME_ALERT_WEBHOOK_URL:-}" ]; then
              echo "- Webhook de alerta: configurado"
            else
              echo "- Webhook de alerta: nao configurado"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Run external health checks
        if: env.UPTIME_MONITOR_SKIP != '1'
        shell: bash
        run: |
          set +e
          set -u
          set -o pipefail

          FAILED=0
          FAIL_REASONS=()

          check_endpoint() {
            local label="$1"
            local url="$2"
            local tmp_body
            local tmp_err
            local http_code
            local curl_exit
            local body_snippet
            local err_snippet

            tmp_body="$(mktemp)"
            tmp_err="$(mktemp)"

            http_code="$(curl --silent --show-error --location --max-time 20 --connect-timeout 10 \
              --output "$tmp_body" --write-out "%{http_code}" "$url" 2>"$tmp_err")"
            curl_exit=$?

            if [ $curl_exit -ne 0 ]; then
              err_snippet="$(head -c 220 "$tmp_err" | tr '\n' ' ')"
              echo "::error title=${label} healthcheck falhou::curl exit ${curl_exit} para ${url}. ${err_snippet}"
              echo "- ${label}: FAIL (curl exit ${curl_exit})" >> "$GITHUB_STEP_SUMMARY"
              FAIL_REASONS+=("${label}=curl_${curl_exit}")
              FAILED=1
            elif [ "$http_code" -lt 200 ] || [ "$http_code" -ge 400 ]; then
              body_snippet="$(head -c 220 "$tmp_body" | tr '\n' ' ')"
              echo "::error title=${label} healthcheck falhou::HTTP ${http_code} para ${url}. Body: ${body_snippet}"
              echo "- ${label}: FAIL (HTTP ${http_code})" >> "$GITHUB_STEP_SUMMARY"
              FAIL_REASONS+=("${label}=http_${http_code}")
              FAILED=1
            else
              echo "::notice title=${label} healthcheck OK::HTTP ${http_code} em ${url}"
              echo "- ${label}: OK (HTTP ${http_code})" >> "$GITHUB_STEP_SUMMARY"
            fi

            rm -f "$tmp_body" "$tmp_err"
          }

          {
            echo "## Resultado checks"
          } >> "$GITHUB_STEP_SUMMARY"

          check_endpoint "API" "$UPTIME_API_URL"

          if [ -n "${UPTIME_WEB_URL:-}" ]; then
            check_endpoint "WEB" "$UPTIME_WEB_URL"
          else
            echo "::notice title=WEB healthcheck ignorado::UPTIME_WEB_URL nao definido."
            echo "- WEB: SKIP (UPTIME_WEB_URL nao definido)" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ $FAILED -ne 0 ] && [ -n "${UPTIME_ALERT_WEBHOOK_URL:-}" ]; then
            FAIL_JOINED="$(IFS=';'; echo "${FAIL_REASONS[*]}")"
            PAYLOAD=$(printf '{"source":"github-actions","workflow":"%s","runId":"%s","apiUrl":"%s","webUrl":"%s","status":"failed","reasons":"%s"}' "$GITHUB_WORKFLOW" "$GITHUB_RUN_ID" "$UPTIME_API_URL" "${UPTIME_WEB_URL:-}" "$FAIL_JOINED")
            curl -fsS -X POST "$UPTIME_ALERT_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD" || true
          fi

          if [ $FAILED -ne 0 ]; then
            {
              echo "## Resultado final"
              echo "- Estado: FAIL"
              echo "- Razoes: ${FAIL_REASONS[*]}"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "## Resultado final"
              echo "- Estado: OK"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          exit $FAILED
