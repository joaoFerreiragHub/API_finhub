version: '3.9'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finhub-api
    env_file:
      - .env
    environment:
      PORT: 3000
      MONGODB_URI: mongodb://mongo:27017/finhub
      REDIS_URL: redis://redis:6379
      RATE_LIMIT_REDIS_URL: redis://redis:6379
    ports:
      - '5000:3000'
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - uploads_data:/app/uploads
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: finhub-mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 20s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: finhub-redis
    ports:
      - '6379:6379'
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  mongo_data:
  redis_data:
  uploads_data:
