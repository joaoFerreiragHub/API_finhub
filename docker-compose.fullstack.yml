version: '3.9'

services:
  api:
    environment:
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:4173}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000,http://localhost:4173}

  web:
    build:
      context: ${FRONTEND_BUILD_CONTEXT:-../FinHub-Vite}
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${WEB_VITE_API_URL:-http://localhost:5000/api}
        VITE_SITE_URL: ${WEB_VITE_SITE_URL:-http://localhost:4173}
    container_name: finhub-web
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 4173
    ports:
      - '4173:4173'
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O - http://127.0.0.1:4173/ > /dev/null 2>&1 || exit 1']
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 25s
    restart: unless-stopped
